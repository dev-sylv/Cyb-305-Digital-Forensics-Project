services:
  - type: web
    name: chainlock-server
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: cd server && node ./dist/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
