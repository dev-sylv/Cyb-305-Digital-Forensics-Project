services:
  - type: web
    name: chainlock-server
    env: node
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && node ./dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
